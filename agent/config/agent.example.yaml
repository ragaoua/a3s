# yaml-language-server: $schema=../schemas/agent.config.schema.json

llm:
  api_url: https://api.openai.com/v1
  api_key: "${A3S_LLM_API_KEY}"
  model: gpt-4o-mini

agent:
  name: Cody
  description: A helpful coding assistant
  instructions: |
    You are a coding agent. Use the tools provided to access the user's requests
    regarding coding tasks.

server:
  listen_address: 127.0.0.1
  listen_port: 8000

mcp_servers:
  - url: http://mcp1.example.com/mcp
    auth: none
  - url: http://mcp2.example.com/mcp
    auth:
      mode: oauth_client_credentials
      token_endpoint: http://mcp2.example.com/mcp/token
      client_id: myclient
      client_secret: ${A3S_MCP2_CLIENT_SECRET}
      auth_method: client_secret_post # Defaults to client_secret_basic.

  # `oauth_token_exchange` and `oauth_token_forward` modes require that the
  # root-level `auth.mode` be `oauth2`, since they expect a token to be
  # provided
  # - url: http://mcp3.example.com/mcp
  #   auth:
  #     mode: oauth_token_forward
  # - url: http://mcp4.example.com/mcp
  #   auth:
  #     mode: oauth_token_exchange
  #
  #     discovered: true # Discovered from the metadata of the authorization
  #                      # server (defined at `auth.issuer_url`)
  #     # Or configure the endpoint directly instead:
  #     discovered: false
  #     token_endpoint: http://mcp4.example.com/mcp/token
  #
  #     client_id: myclient
  #     client_secret: ${A3S_MCP4_CLIENT_SECRET}
  #     auth_method: client_secret_post # Defaults to client_secret_basic.

auth: none
# auth:
