#     jwt:
#       jwks:
#         discovered: true
#         # Or use an explicit JWKS endpoint instead:
#         discovered: false
#         url: http://auth.example.com/.well-known/jwks.json
#
#       # Enable RFC 9068 claims validation
#       rfc9068:
#         resource_server: my_resource_server_identifier
#
#       claims:
#         scope: read
#
#     # Enable token introspection
#     introspection:
#       discovered: true
#       # Or configure the endpoint directly instead:
#       discovered: false
#       endpoint: http://auth.example.com/oauth/introspect
#
#       client_id: ${A3S_AGENT_INTROSPECTION_CLIENT_ID}
#       client_secret: ${A3S_AGENT_INTROSPECTION_CLIENT_SECRET}
#
#       # Defaults to client_secret_basic.
#       auth_method: client_secret_post

logging:
  level: "INFO"
  format: "plain"
