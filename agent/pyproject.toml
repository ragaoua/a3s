[project]
name = "a3s-agent"
version = "0.1.0"
description = "a2s configurable agent server"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "a2a-sdk==0.3.3",
    "authlib>=1.3.0",
    "google-adk==1.27.0",
    "litellm"
]

[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project.scripts]
a3s-agent = "src.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]

[tool.pytest.ini_options]
addopts = "--disable-warnings"
