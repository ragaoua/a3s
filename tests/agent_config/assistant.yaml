# yaml-language-server: $schema=../../agent/schemas/agent.config.schema.json

llm:
  api_url: "${A3S_LLM_API_URL}"
  api_key: "${A3S_LLM_API_KEY}"
  model: "${A3S_LLM}"

agent:
  name: Norman
  description: A helpful assistant
  instructions: |
    You are a helpful assistant. You answer the user's requests and, if
    necessary, delegate tasks to other agents.
  subagents:
    math_prodigy:
      url: http://localhost:8001
      type: peer
      auth: none
    history_tutor:
      url: http://localhost:8002
      type: delegate
      auth:
        mode: api_key
        api_key: azerty

server:
  listen_address: 127.0.0.1
  listen_port: 8000

auth: none
