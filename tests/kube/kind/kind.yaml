kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: a3s-kind
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080 # Used to expose the app via service
        hostPort: 8080
        protocol: TCP
      - containerPort: 30081 # Used to expose test agent via service
        hostPort: 8000
        protocol: TCP
      - containerPort: 30082 # Used to expose test MCP server via service
        hostPort: 10000
        protocol: TCP
