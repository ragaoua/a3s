apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-pod-operator
  namespace: agents-ns
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "patch", "list", "delete"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["create", "delete"]
